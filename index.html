.container{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:0 20px}

.draw-btn:active{transform:scale(.97)}
.draw-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.draw-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.1) 50%,transparent 60%);animation:shimmer 2s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.draw-hint{margin-top:12px;font-size:12px;color:rgba(232,220,200,.3);letter-spacing:.08em}
.deck-info{margin-top:8px;font-size:12px;color:var(--accent);letter-spacing:.06em}
.reveal-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.85);justify-content:center;align-items:center;flex-direction:column}

.card-front{background:var(--card-front);color:var(--text-dark);transform:rotateY(180deg);padding:24px;display:flex;flex-direction:column;box-shadow:0 0 40px rgba(212,160,64,.15)}

.card-front .card-icon{font-size:36px;margin-bottom:8px}
.card-front .card-title{font-size:20px;font-weight:700;margin-bottom:14px;color:#2a1a08;letter-spacing:.04em}

.card-front .card-divider{width:32px;height:2px;background:var(--accent2);margin:14px 0}

.empty-collection{text-align:center;padding:40px 0;color:rgba(232,220,200,.2);font-size:14px;letter-spacing:.08em}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--accent2);color:#fff;padding:10px 24px;border-radius:4px;font-size:13px;z-index:200;letter-spacing:.06em;opacity:0;transition:opacity .3s;pointer-events:none}

<script>
var CARDS=[{id:1,cat:"水源",icon:"💧",title:"没有自来水之后",knowledge:"一个成年人每天至少需要 2-3 升饮用水。记住三个来源：热水器里有 150 升起跳的储备水；马桶水箱（不是马桶）是干净的；雨水收集只需一块塑料布。别忘了家里的花盆底下永远有点存货。",flavor:"你现在喝的每一口自来水，都泡过恐龙的尿。别矫情了。"},{id:2,cat:"食物",icon:"🥫",title:"罐头不会过期",knowledge:"罐头在干燥阴凉环境下，实际保质期远超标签。二战时期 70 年前的军粮罐头开出来还能吃。关键是：罐头不能鼓胀、不能生锈穿孔、打开时没有异味或喷溅。记得备一个手动开罐器，停电时电动的那玩意是废铁。",flavor:"你现在嫌弃的午餐肉，可能是下个月你最想念的东西。"},{id:3,cat:"急救",icon:"🩹",title:"止血比你想象的简单",knowledge:"大出血时不要想太多：直接按压伤口是最有效的止血方式，用干净布或衣服，死死按住至少 10 分钟不松手。止血带只用在四肢、伤口的近心端、紧到血止住为止。记住一个原则：任何止血方法的第一条都是「别把自己搭进去」。戴手套。",flavor:"你以为会用枪很重要？在末日，会用止血带的人活得更久。"},{id:4,cat:"火源",icon:"🔥",title:"打火机终会用完",knowledge:"一次性打火机在没气之后还有一次机会：拆出压电打火器，那个小火花能点燃气灶、引燃棉花、点燃酒精棉片。学会用 9V 电池 + 钢丝绒取火（把钢丝绒拉松，电池正负极一碰就着），比钻木取火靠谱一万倍。棉花球蘸凡士林是最好的引火物。",flavor:"你收集了 50 个打火机？很好。其中一个在你最需要的时候一定会坏。"},{id:5,cat:"庇护所",icon:"🏚️",title:"晚上别睡在地上",knowledge:"野外过夜，地面会吸走你身体 60% 的热量。在身体和地面之间至少垫 10 厘米的隔离层：干树叶、松枝、背包、纸板都可以。如果什么都没有，蹲着也比躺着暖和。紧急太空毯反射 90% 体温，但必须裹紧，留缝等于没裹。",flavor:"浪漫地「以天为被以地为床」的人，大多在黎明前就失温了。"},{id:6,cat:"通讯",icon:"📻",title:"手机没信号之后",knowledge:"FM 收音机是末日最重要的小电器，两节五号电池能撑一周，可以接收几十公里内的广播。手台（对讲机）在没有基站的情况下，城市里有效距离约 1-3 公里，开阔地可达 5-10 公里。如果都没有，一面镜子的反光信号在晴天可以看到 15 公里远。",flavor:"你刷短视频的时间够学摩斯密码了。算了，SOS 三个字母记住就行。"},{id:7,cat:"方向",icon:"🧭",title:"没有 GPS 怎么认路",knowledge:"白天：手表时针指向太阳，时针与 12 点夹角的平分线指向南方（北半球）。夜晚：北斗七星勺口两颗星延长 5 倍的距离就是北极星。没有表没有星：看树——北半球孤树的南侧枝叶更茂密，树桩年轮南侧更宽。教堂通常坐西朝东。",flavor:"你的手机导航告诉你「前方 200 米右转」，但没告诉你电池只剩 3%。"},{id:8,cat:"绳索",icon:"🪢",title:"你会打几个结",knowledge:"三个结可以解决 90% 的问题：八字结（固定，不会自己松开）、称人结（固定物体不滑动，救命结）、双套结（调节长度，晾衣搭棚通用）。不需要学航海级别的打结大全，这三个练到闭眼能打就够了。用鞋带先练，练 20 遍形成肌肉记忆。",flavor:"你打了二十年的鞋带蝴蝶结，绳子一换就不会了。这很人类。"},{id:9,cat:"心理",icon:"🧠",title:"恐慌比灾难更致命",knowledge:"紧急情况下的「333 法则」：3 分钟不呼吸、3 小时失温、3 天缺水、3 周缺粮。但恐慌可以在 30 秒内让你做出致命决定。应对方法很简单：先坐下，深呼吸 4 次，数到 30，然后再行动。这个简单的延迟可以避免大多数灾难中的二次伤害。",flavor:"丧尸还没来，你先被自己的心跳声吓死了。深呼吸，战士。"},{id:10,cat:"能源",icon:"⚡",title:"停电以后",knowledge:"一个汽车电瓶（12V 60Ah）储存约 0.7 度电，用一个逆变器就能给手机充几百次、给 LED 灯供电几十小时、甚至短暂驱动小冰箱。太阳能板 + 电瓶是最便宜的离网电力方案。记住：冰箱断电后保持关门，冷冻室能撑 24-48 小时，冷藏室 4 小时。",flavor:"你囤了一堆充电宝，却忘了它们也需要充电。这就叫文明人的盲区。"},{id:11,cat:"自卫",icon:"🛡️",title:"最好的武器不是枪",knowledge:"在真正的混乱中，显眼的武器会让人把你当成首要目标。低调是最大的安全。不在混乱区域逗留、不炫耀物资、不在陌生人面前讨论你的储备。一个看起来很无聊的人，比一个看起来很厉害的人活得久。如果真的需要防身，强光手电（闪瞎对方）加随身警报器就够了。",flavor:"你想用它打僵尸吗？不。它打不了僵尸。但它能让你不用打僵尸。"},{id:12,cat:"卫生",icon:"🧼",title:"厕所比食物更需要预案",knowledge:"没有冲水马桶时，痢疾和霍乱杀的人比饥饿多。最简单的应急厕所：一个大号塑料桶 + 厚垃圾袋 + 猫砂或木屑。每次用完后撒一层覆盖物封住气味。两个桶轮流用，满了就密封挖深坑掩埋（远离水源至少 30 米）。漂白水稀释 10 倍是最好用的消毒液。",flavor:"你想象末日画面里都是枪战和飙车。真正的末日画面里大家都在找厕所。"},{id:13,cat:"工具",icon:"🔧",title:"一把莱泽曼能救你的命",knowledge:"一把多功能钳子（Leatherman 或瑞士军刀）涵盖钳子、刀、螺丝刀、剪刀、开瓶器。不用带一箱工具。重点：刀片保持锋利（钝刀比快刀危险 10 倍），钳子是最被低估的功能。再配一卷电工胶带，修 80% 的家用东西够了。",flavor:"你工具箱里最值钱的那把德国钳子，末日第一天就会有人拿它来撬你的门。藏好。"},{id:14,cat:"保暖",icon:"🧥",title:"穿对的衣服比搭帐篷重要",knowledge:"三层穿衣法：贴身排汗层（速干，别穿纯棉）、中间保温层（抓绒或羊毛）、外层防风防水。纯棉致命——湿了以后丧失所有保温能力，且干得极慢。袜子永远多带一双干的。在寒冷中，帽子比你想象的重要：头部散热占全身 30-50%。",flavor:"你在商场抢的那件加拿大鹅羽绒服，淋一场雨之后还不如一件雨衣加几层报纸。"},{id:15,cat:"植物",icon:"🌿",title:"哪些野草能救命",knowledge:"中国的常见可食用野生植物：马齿苋（多肉小叶，酸酸的，遍地都是）、荠菜（春天最安全的选择）、蒲公英（全株可食，根可以烤来当咖啡替代品）。一票否决规则：任何有乳白色汁液的植物不要碰；伞形花序的植物（像小伞）大多有毒，除非你能 100% 确认是胡萝卜科的。",flavor:"分辨蘑菇有没有毒？当地老人看一眼就知道。你没有这个老人，所以别碰任何蘑菇。"},{id:16,cat:"信息",icon:"📖",title:"有本书比手机好使",knowledge:"下载到本地的信息才是你的。提前存好：本地地图（含等高线）、基础急救手册、常见植物图谱、基础机械维修指南。纸质版永不过期。一个旧 Kindle 充满电能用一个月，存几千本书，比一架子纸质书好带。记得把 PDF 转成 Kindle 格式。",flavor:"「这东西网上都有。」——说这话的人，在断网第三天开始后悔。"},{id:17,cat:"社交",icon:"🤝",title:"独狼死得最快",knowledge:"末日电影里主角总是独来独往，现实中独行者在第一周死亡率最高。一个 3-5 人的小团体有不同技能（医疗、机械、烹饪、谈判），可以轮流守夜、分担体力活、互相照应。最大的危险不是丧尸，是信任错人。别急着跟陌生人展示你的全部储备。",flavor:"你想当那个骑着摩托车扫射丧尸的硬汉。但硬汉也需要有人帮他缝伤口。"},{id:18,cat:"城市",icon:"🏙️",title:"高层建筑里的水压",knowledge:"停电后，高层建筑（6 层以上）的二次供水系统会瞬间失效——水泵不转了。所有高于市政水压能达范围的水龙头都没水。你住在 20 楼？那你的逃生包里第一件东西应该是水，不是刀。电梯是死亡陷阱，楼梯间里可能有烟，往下走时口罩打湿。",flavor:"你那套顶层复式末日堡垒方案，在电梯停运的第一天就变成了 30 层健身挑战。"},{id:19,cat:"宠物",icon:"🐕",title:"你的狗比监控好用",knowledge:"狗能在人类察觉到危险前很久就感知到异常——气味、声音、振动。中型犬的警觉性和威慑力性价比最高。需要准备：至少一周的狗粮、折叠水碗、牵引绳备份、狗的基础药物（驱虫药、止血粉）。你的狗不会背叛你，但它需要你活下去。",flavor:"你想训练它攻击丧尸？先教它别吃地上的不明物体吧。"},{id:20,cat:"理财",icon:"💰",title:"末日经济学",knowledge:"通货膨胀时，实物永远比钞票值钱。但不要把所有钱变成物资——流通性也很重要。最保值的「末日硬通货」排序：药品 > 弹药 > 酒 > 香烟 > 电池 > 糖 > 咖啡。这些东西轻便、耐储存、人人需要。金条？太重了，而且不能吃。",flavor:"你囤比特币应对末日。末日来了，电都没了，你的财富只剩下一串没人看得见的数字。"},{id:21,cat:"旅行",icon:"🎒",title:"72 小时生存包",knowledge:"每个家庭成员一个背包，放在门口，随时可抓走。内容：3 升水、3 天高热量食物（能量棒/坚果）、急救包、手电 + 备用电池、多功能工具、保暖毯、雨衣、重要证件复印件、现金零钱、充电宝、哨子。总重不超过你体重的 15%。每半年检查一次，换掉过期的东西。",flavor:"这叫 BOB（Bug-Out Bag）——逃生包。不是那些你在淘宝上买的「末日求生 300 件套」。"},{id:22,cat:"烹饪",icon:"🍳",title:"没有燃气怎么做饭",knowledge:"酒精炉是城市里最安全简易的替代热源：医用酒精倒进一个剪开的易拉罐里，点火就行。户外用固体酒精块更方便。还有个方法：汽车发动机舱在行驶后滚烫，用锡纸包好食物放上去，半小时后就能吃到热饭。别笑，长途卡车司机就这么干的。",flavor:"你花三千块买的户外钛合金炉头，在关键时刻还不如一个可乐罐改造的酒精炉好使。"},{id:23,cat:"记忆",icon:"🧿",title:"数字世界的你想好了吗",knowledge:"把所有重要信息打印一份：紧急联系人、保险单号、银行账号、房产证、医疗记录。不要只存在云端。一个防水文件袋，放在生存包侧兜。密码管理器的紧急恢复码也打印出来。别高估自己的记忆力，也别高估手机的电量。",flavor:"你知道世界末日后什么最没用吗？你的人脸识别登录。你的脸还是那张脸，但服务器没了。"},{id:24,cat:"哲学",icon:"💀",title:"末日的第一课",knowledge:"生存的最核心法则不是你有多少物资，而是你能不能快速接受现实。世界变了，你得跟着变。怀旧、抱怨、等别人来救——这三种心态杀的人比丧尸多。活下来的人都有个共同点：在其他人还在怀疑「这真的发生了吗」的时候，他们已经行动起来。",flavor:"战争永远不会改变。人类也永远不会。但你可以变得比昨天更不好惹一点。"}];
var collected=new Set();try{var saved=JSON.parse(localStorage.getItem('dc'));if(Array.isArray(saved))collected=new Set(saved)}catch(e){}
function save(){localStorage.setItem('dc',JSON.stringify([...collected]))}
function updateUI(){document.getElementById('collectedCount').textContent=collected.size;document.getElementById('totalCount').textContent=CARDS.length;var g=document.getElementById('collectionGrid');var eh=document.getElementById('emptyHint');if(collected.size===0){g.innerHTML='';if(!document.getElementById('emptyHint')){var d=document.createElement('div');d.className='empty-collection';d.id='emptyHint';d.textContent='还没抽过卡，来一张？';g.appendChild(d)}return}if(eh)eh.remove();g.innerHTML='';var sorted=[...collected].sort(function(a,b){return a-b});sorted.forEach(function(id){var card=CARDS.find(function(c){return c.id===id});if(!card)return;var div=document.createElement('div');div.className='mini-card';div.innerHTML='<div class="mini-icon">'+card.icon+'</div><div class="mini-title">'+card.title+'</div><div class="mini-cat">'+card.cat+'</div>';div.onclick=function(){showCard(card)};g.appendChild(div)})}
var currentCard=null;
function getRandomCard(){var avail=CARDS.filter(function(c){return !collected.has(c.id)});if(avail.length===0)return CARDS[Math.floor(Math.random()*CARDS.length)];return avail[Math.floor(Math.random()*avail.length)]}
function drawCard(){var btn=document.getElementById('drawBtn');btn.disabled=true;currentCard=getRandomCard();var isNew=!collected.has(currentCard.id);var inner=document.getElementById('cardInner');inner.classList.remove('flipped');var front=document.getElementById('cardFront');front.innerHTML='<div class="card-category">'+currentCard.cat+'</div><div class="card-icon">'+currentCard.icon+'</div><div class="card-title">'+currentCard.title+'</div><div class="card-knowledge">'+currentCard.knowledge+'</div><div class="card-divider"></div><div class="card-flavor">'+currentCard.flavor+'</div><div class="card-number">No. '+(currentCard.id<10?'0':'')+currentCard.id+'</div>';document.getElementById('revealOverlay').classList.add('active');setTimeout(function(){inner.classList.add('flipped');if(isNew){collected.add(currentCard.id);save();updateUI();showToast('新卡牌！')}else{setTimeout(function(){showToast('你已经抽过这张了')},400)}},400);setTimeout(function(){btn.disabled=false},1000)}
function showCard(card){currentCard=card;var inner=document.getElementById('cardInner');inner.classList.remove('flipped');var front=document.getElementById('cardFront');front.innerHTML='<div class="card-category">'+card.cat+'</div><div class="card-icon">'+card.icon+'</div><div class="card-title">'+card.title+'</div><div class="card-knowledge">'+card.knowledge+'</div><div class="card-divider"></div><div class="card-flavor">'+card.flavor+'</div><div class="card-number">No. '+(card.id<10?'0':'')+card.id+'</div>';document.getElementById('revealOverlay').classList.add('active');setTimeout(function(){inner.classList.add('flipped')},300)}
function closeCard(){document.getElementById('cardInner').classList.remove('flipped');document.getElementById('revealOverlay').classList.remove('active')}
document.getElementById('revealOverlay').addEventListener('click',function(e){if(e.target===this)closeCard()});
document.getElementById('revealClose').addEventListener('click',closeCard);
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeCard()});
document.getElementById('drawBtn').addEventListener('click',drawCard);
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},1800)}
updateUI();
</script>
</body>
</html>
